services:
  # 1. Backend (API + Worker + Beat)
  - type: web
    name: blostem-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "bash backend/start.sh"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: static
          name: blostem-frontend
          property: url

  # 2. Frontend (Static Site)
  - type: static
    name: blostem-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: blostem-backend
          property: url
